<html lang="tr">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 🔥 BURAYA KENDİ FIREBASE CONFIG'İNİ YAZ
        const firebaseConfig = {
            apiKey: "AIzaSyCqz54wkidyD4ih7BehylAmfIxH8AQiJKk",
            authDomain: "reis-6c69b.firebaseapp.com",
            projectId: "reis-6c69b",
            storageBucket: "reis-6c69b.firebasestorage.app",
            messagingSenderId: "1067323430561",
            appId: "1:1067323430561:web:cd8a8f3debf3bea3f9c2e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window._db = db;
        window._tradesCol = collection(db, "trades");
        window._addDoc = addDoc;
        window._deleteDoc = deleteDoc;
        window._doc = doc;
        window._onSnapshot = onSnapshot;
        window._setDoc = setDoc;
        window._collection = collection;
        window._query = query;
        window._orderBy = orderBy;
        window._allTrades = [];
        window._dbReady = true;

        // Trades listener
        onSnapshot(query(collection(db, "trades"), orderBy("id", "desc")), (snap) => {
            window._allTrades = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
            if (!window.currentUser) {
                const saved = sessionStorage.getItem('currentUser');
                if (saved) window.currentUser = saved;
            }
            if (window.render) window.render();
        });

        // Presence listener
        onSnapshot(collection(db, "presence"), (snap) => {
            window._onlineUsers = {};
            const now = Date.now();
            snap.docs.forEach(d => {
                const data = d.data();
                const lastSeen = typeof data.lastSeen === 'number' ? data.lastSeen : 0;
                window._onlineUsers[d.id] = (now - lastSeen) < 30000;
            });
            if (window.updatePresenceDots) window.updatePresenceDots();
        });

        // Chat listener
        onSnapshot(query(collection(db, "chat"), orderBy("ts", "asc")), (snap) => {
            window._chatMsgs = snap.docs.map(d => d.data());
            if (window.renderChat) window.renderChat(window._chatMsgs);
            if (!window._chatOpen && window._chatMsgs.length > 0) {
                const last = window._chatMsgs[window._chatMsgs.length - 1];
                if (last.user !== window.currentUser) {
                    window._unread = (window._unread || 0) + 1;
                    const badge = document.getElementById('chatUnread');
                    if (badge) { badge.style.display = 'flex'; badge.textContent = window._unread; }
                }
            }
        });

        console.log("✅ Firebase bağlandı");
    </script>

        .dropdown-item { padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--dropdown-border); }
        .dropdown-item:hover { background:var(--dropdown-hover); }
        .rr-lvl-low { color:#10b981; } .rr-lvl-mid { color:#fbbf24; } .rr-lvl-high { color:#f97316; } .rr-lvl-extreme { color:#ef4444; }

        @keyframes loading { 0%{opacity:1}50%{opacity:0.4}100%{opacity:1} }
        .theme-toggle { cursor:pointer;padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text-main);font-size:11px;font-weight:900;letter-spacing:0.1em;transition:all 0.2s; }
        /* Chat styles */
        #chatMessages { flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px; }

        #chatSendBtn { background:linear-gradient(135deg,#10b981,#3b82f6);border:none;border-radius:10px;width:36px;cursor:pointer;color:white;font-size:15px; }
    </style>

    async function hashPassword(str) {
        const msgBuffer = new TextEncoder().encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function setLoading(on) { document.getElementById('loadingBar').style.display = on ? 'block' : 'none'; }
    function toggleDropdown() { document.getElementById('accDropdown').classList.toggle('show'); }
    function checkCustomRR(val) { document.getElementById('customRRInput').classList.toggle('hidden', val !== 'custom'); }
    function checkOtherSetup(val) { document.getElementById('otherSetupInput').classList.toggle('hidden', val !== 'other'); }
    window.onclick = function(e) { if (!e.target.closest('.dropdown')) document.getElementById('accDropdown').classList.remove('show'); }

    function toggleTheme() {
        const isLight = document.body.classList.toggle('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        document.getElementById('themeBtn').textContent = isLight ? 'DARK MODE' : 'LIGHT MODE';
    }
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeBtn').textContent = 'DARK MODE';
    }

    function updateClock() {
        const now = new Date();
        const utc3 = new Date(now.getTime() + 3*60*60*1000);
        const h = String(utc3.getUTCHours()).padStart(2,'0');
        const m = String(utc3.getUTCMinutes()).padStart(2,'0');
        const s = String(utc3.getUTCSeconds()).padStart(2,'0');
        const el = document.getElementById('utcClock');
        if (el) el.textContent = h+':'+m+':'+s;
    }
    updateClock(); setInterval(updateClock, 1000);

    async function unlock() {
        const input = document.getElementById('keyInput').value;
        const hash = await hashPassword(input);
        if (hash === AUTH_HASH) {
            sessionStorage.setItem('unlocked', '1');
            showApp();
        } else {
            document.getElementById('keyInput').style.borderColor = '#ef4444';
            setTimeout(() => document.getElementById('keyInput').style.borderColor = '#333', 1000);
        }
    }

    function showApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden-app');
        const savedUser = sessionStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = savedUser;
            document.getElementById('activeDisplay').innerText = savedUser;
            document.getElementById('inputSection').classList.toggle('hidden', savedUser === 'ALL');
            const avatar = document.getElementById('statusAvatar');
            if (avatar && PROFILE_PHOTOS[savedUser]) { avatar.src = PROFILE_PHOTOS[savedUser]; avatar.classList.remove('hidden'); }
            document.getElementById('chatBtnWrap').style.display = savedUser !== 'ALL' ? 'block' : 'none';
        }
    }
    if (sessionStorage.getItem('unlocked') === '1') showApp();

    function switchUser(user) {
        currentUser = user;
        window.currentUser = user;
        sessionStorage.setItem('currentUser', user);
        document.getElementById('activeDisplay').innerText = user;
        document.getElementById('accDropdown').classList.remove('show');
        document.getElementById('inputSection').classList.toggle('hidden', user === 'ALL');
        const avatar = document.getElementById('statusAvatar');
        if (avatar && PROFILE_PHOTOS[user]) { avatar.src = PROFILE_PHOTOS[user]; avatar.classList.remove('hidden'); }
        else if (avatar) avatar.classList.add('hidden');
        document.getElementById('chatBtnWrap').style.display = user !== 'ALL' ? 'block' : 'none';
        pingPresence(user);
        if (window.render) window.render();
    }

    window._onlineUsers = {};
    window.updatePresenceDots = function() {
        ['SAMET','YUNUS'].forEach(user => {
            const dot = document.getElementById('dot-' + user);
            if (!dot) return;
            const online = window._onlineUsers[user];
            dot.style.background = online ? '#10b981' : '#475569';
            dot.style.boxShadow = online ? '0 0 6px #10b981' : 'none';
        });
        const selfDot = document.getElementById('selfDot');
        if (selfDot && currentUser && currentUser !== 'ALL') {
            const online = window._onlineUsers[currentUser];
            selfDot.style.background = online ? '#10b981' : '#475569';
            selfDot.style.boxShadow = online ? '0 0 8px #10b981' : 'none';
        }
    }

    async function pingPresence(user) {
        if (!window._setDoc || !user || user === 'ALL') return;
        try {
            await window._setDoc(window._doc(window._db, "presence", user), { lastSeen: Date.now() }, { merge: true });
            const selfDot = document.getElementById('selfDot');
            if (selfDot) { selfDot.style.background = '#10b981'; selfDot.style.boxShadow = '0 0 8px #10b981'; }
        } catch(e) { console.error('ping error', e); }
    }
    setInterval(() => { if (currentUser && currentUser !== 'ALL') pingPresence(currentUser); }, 15000);

    window._pnlSign = '+';
    function setPnlSign(sign) {
        window._pnlSign = sign;
        document.getElementById('pnlPlus').style.background = sign === '+' ? 'rgba(16,185,129,0.2)' : '';
        document.getElementById('pnlMinus').style.background = sign === '-' ? 'rgba(239,68,68,0.2)' : '';
    }
    setPnlSign('+');

    function getRRColorClass(rr) {
        const num = parseFloat(rr.split(':')[1]) || 1;
        if (num <= 2) return 'rr-lvl-low';
        if (num <= 4) return 'rr-lvl-mid';
        if (num <= 6) return 'rr-lvl-high';
        return 'rr-lvl-extreme';
    }

    async function addTrade() {
        if (!currentUser || currentUser === 'ALL') return;
        if (!window._dbReady) { alert('Firebase bağlanmadı'); return; }
        const now = new Date();
        const manualDate = document.getElementById('tradeDate').value;
        const manualTime = document.getElementById('tradeTime').value;
        const rrVal = document.getElementById('rr').value;
        const finalRR = rrVal === 'custom' ? document.getElementById('customRRInput').value : rrVal;
        const setupVal = document.getElementById('setup').value;
        const finalSetup = setupVal === 'other' ? document.getElementById('otherSetupInput').value : setupVal;
        const trade = {
            id: Date.now(), user: currentUser,
            date: manualDate ? new Date(manualDate).toLocaleDateString('tr-TR') : now.toLocaleDateString('tr-TR'),
            time: manualTime || now.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}),
            p: document.getElementById('pair').value,
            ss: document.getElementById('session').value,
            st: finalSetup || "Other",
            rr: finalRR || "1:1",
            desc: document.getElementById('desc').value,
            c: document.getElementById('chart').value.trim() || '#',
            w: document.getElementById('result').value === 'win' ? true : document.getElementById('result').value === 'be' ? 'be' : false,
            pnlSign: window._pnlSign || '+',
            pnlVal: document.getElementById('pnlValue').value || ''
        };
        setLoading(true);
        try {
            await window._addDoc(window._tradesCol, trade);
            document.getElementById('chart').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('pnlValue').value = '';
            setPnlSign('+');
        } catch(e) { alert('Kayıt hatası: ' + e.message); }
        setLoading(false);
    }

    function askDelete(docId) {
        deleteDocId = docId;
        document.getElementById('confirmModal').style.display = 'flex';
        document.getElementById('confirmDeleteBtn').onclick = async () => {
            const id = deleteDocId;
            closeModal();
            setLoading(true);
            try { await window._deleteDoc(window._doc(window._db, "trades", id)); }
            catch(e) { alert('Silme hatası: ' + e.message); }
            setLoading(false);
        };
    }
    function closeModal() { document.getElementById('confirmModal').style.display = 'none'; deleteDocId = null; }

    window.render = function() {
        const container = document.getElementById('tradeList');
        container.innerHTML = '';
        if (!currentUser) return;
        const trades = (window._allTrades || []).filter(t => currentUser === 'ALL' ? true : t.user === currentUser);
        if (!trades.length) {
            container.innerHTML = `<div class="text-center font-black uppercase tracking-widest text-xs py-20" style="opacity:0.2">No trades logged yet.</div>`;
            return;
        }
        trades.forEach(t => {
            const badge = t.user === 'SAMET' ? 'text-blue-400 border-blue-400/20' : 'text-pink-400 border-pink-400/20';
            const rrClass = getRRColorClass(t.rr);
            container.innerHTML += `
                <div class="card-layer p-6 rounded-2xl flex items-center justify-between group">
                    <div class="flex items-center gap-6">
                        <div class="w-1.5 h-12 rounded-full ${t.w ? 'bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.3)]'}"></div>
                        <div>
                            <div class="flex items-center gap-3">
                                <span class="text-xl font-black" style="color:var(--text-main)">${t.p}</span>
                                <span class="text-[9px] font-black border px-2 py-0.5 rounded uppercase ${badge}">${t.user}</span>
                                <span class="text-[10px] font-black ${t.w === true ? 'text-emerald-500' : t.w === 'be' ? 'text-yellow-400' : 'text-rose-500'} uppercase">${t.w === true ? 'WIN' : t.w === 'be' ? 'BE' : 'LOSS'}</span>
                            </div>
                            <div class="text-[10px] uppercase font-black tracking-widest mt-1" style="color:var(--text-main);opacity:0.5">${t.ss} • ${t.st}</div>
                            <div class="text-[10px] font-black tracking-widest mt-1" style="color:var(--text-main);opacity:0.4">${t.date||''} ${t.time ? '• '+t.time : ''}</div>
                            ${t.desc ? `<div class="text-xs mt-2 italic" style="color:var(--text-main);opacity:0.5">"${t.desc}"</div>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="flex flex-col items-end">
                            <span class="text-[10px] font-black uppercase mb-1" style="color:var(--text-main);opacity:0.4">Ratio</span>
                            <span class="text-sm font-black ${rrClass}">${t.rr}</span>
                        </div>
                        ${t.pnlVal ? `<div class="flex flex-col items-end">
                            <span class="text-[10px] font-black uppercase mb-1" style="color:var(--text-main);opacity:0.4">PNL</span>
                            <span class="text-sm font-black ${t.pnlSign==='+' ? 'text-emerald-500' : 'text-rose-500'}">${t.pnlSign}$${t.pnlVal}</span>
                        </div>` : ''}
                        <div class="flex items-center gap-3">
                            <a href="${t.c}" target="_blank" class="p-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors ${t.c==='#' ? 'opacity-5 pointer-events-none' : ''}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                            </a>
                            ${currentUser !== 'ALL' ? `<button onclick="askDelete('${t._docId}')" class="opacity-0 group-hover:opacity-100 p-3 text-rose-500 hover:bg-rose-500/10 rounded-xl transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>` : ''}
                        </div>
                    </div>
                </div>`;
        });
    }

    // ===== CHAT =====
    window._chatOpen = false;
    window._unread = 0;

    window.toggleChat = function() {
        window._chatOpen = !window._chatOpen;
        document.getElementById('chatBox').style.display = window._chatOpen ? 'flex' : 'none';
        if (window._chatOpen) {
            window._unread = 0;
            const badge = document.getElementById('chatUnread');
            badge.style.display = 'none';
            setTimeout(() => {
                const msgs = document.getElementById('chatMessages');
                if (msgs) msgs.scrollTop = msgs.scrollHeight;
                const inp = document.getElementById('chatInput');
                if (inp) inp.focus();
            }, 50);
        }
    }

    window.sendChat = async function() {
        if (!currentUser || currentUser === 'ALL') return;
        if (!window._addDoc || !window._collection || !window._db) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await window._addDoc(window._collection(window._db, 'chat'), { user: currentUser, text, ts: Date.now() });
    }

    window.renderChat = function(msgs) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        msgs.forEach(m => {
            const isMine = m.user === currentUser;
            const photo = PROFILE_PHOTOS[m.user] ? `<img src="${PROFILE_PHOTOS[m.user]}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;margin-${isMine?'left':'right'}:6px;flex-shrink:0">` : '';
            const div = document.createElement('div');
            div.style.cssText = `display:flex;align-items:flex-end;justify-content:${isMine?'flex-end':'flex-start'}`;
            div.innerHTML = (!isMine ? photo : '') +
                `<div style="max-width:75%;padding:8px 12px;border-radius:14px;font-size:11px;font-weight:600;line-height:1.5;background:${isMine?'linear-gradient(135deg,#10b981,#3b82f6)':'var(--input-bg)'};color:${isMine?'white':'var(--text-main)'};border-bottom-${isMine?'right':'left'}-radius:4px">
                    <div style="font-size:9px;font-weight:900;opacity:0.6;margin-bottom:2px;text-transform:uppercase">${m.user}</div>
                    ${m.text}
                </div>` + (isMine ? photo : '');
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
